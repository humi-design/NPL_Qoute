{% extends "base.html" %}
{% block content %}
<div class="page-header"><div><h1 class="page-title">Product Performance</h1></div></div>
<div class="card"><div class="card-body p-0"><table class="table table-hover mb-0"><thead><tr><th>Code</th><th>Product</th><th>Quote Count</th><th>Total Qty</th></tr></thead><tbody>
{% for r in results %}<tr><td>{{ r[1] }}</td><td>{{ r[2] }}</td><td>{{ r[3] }}</td><td>{{ r[4] or 0 }}</td></tr>
{% else %}<tr><td colspan="4" class="text-center">No data</td></tr>
{% endfor %}</tbody></table></div></div>
{% endblock %}
