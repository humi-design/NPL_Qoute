{% extends "base.html" %}
{% block content %}
<div class="page-header"><div><h1 class="page-title">Customer Sales Report</h1></div></div>
<div class="card"><div class="card-body p-0"><table class="table table-hover mb-0"><thead><tr><th>Customer Code</th><th>Customer Name</th><th>Quote Count</th><th>Total Value</th></tr></thead><tbody>
{% for r in results %}<tr><td>{{ r[1] }}</td><td>{{ r[2] }}</td><td>{{ r[3] }}</td><td>₹ {{ "{:,.2f}".format(r[4] or 0) }}</td></tr>
{% else %}<tr><td colspan="4" class="text-center">No data</td></tr>
{% endfor %}</tbody></table></div></div>
{% endblock %}
