{% extends "base.html" %}
{% block content %}
<div class="page-header"><div><h1 class="page-title">{{ machine.machine_name }}</h1><p class="page-subtitle">{{ machine.machine_code }}</p></div>
<div class="page-actions"><a href="{{ url_for('machine.edit', id=machine.id) }}" class="btn btn-outline-primary"><i class="bi bi-pencil"></i> Edit</a></div></div>
<div class="row">
<div class="col-lg-6"><div class="card mb-4"><div class="card-header"><span>Machine Details</span></div><div class="card-body">
<div class="mb-3"><label class="text-muted small">Type</label><div>{{ machine.machine_type or '-' }}</div></div>
<div class="mb-3"><label class="text-muted small">Hourly Rate</label><div>₹ {{ machine.hourly_rate }}</div></div>
<div class="mb-3"><label class="text-muted small">Department</label><div>{{ machine.department or '-' }}</div></div>
<div class="mb-3"><label class="text-muted small">Operator</label><div>{{ machine.operator_name or '-' }}</div></div>
</div></div></div>
</div>
{% endblock %}
